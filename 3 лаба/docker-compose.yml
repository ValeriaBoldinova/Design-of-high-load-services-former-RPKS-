version: '3.8'

networks:
  lab3_net:
    driver: bridge

services:

  postgres:
    image: postgres:15
    container_name: lab3_postgres
    environment:
      POSTGRES_USER: flink
      POSTGRES_PASSWORD: flink
      POSTGRES_DB: lab3
    ports:
      - "5436:5432"
    volumes:
      - ./postgres_init:/docker-entrypoint-initdb.d:ro
      - lab3_pg_data:/var/lib/postgresql/data
    networks:
      - lab3_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flink -d lab3"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.2.0
    container_name: lab3_kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://lab3_kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@lab3_kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

    networks:
      - lab3_net

  kafka-producer:
    build: ./kafka_producer
    container_name: lab3_producer
    environment:
      KAFKA_BOOTSTRAP: lab3_kafka:9092
    volumes:
      - ./исходные данные:/data/csv:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - lab3_net

  flink-job:
    build: ./flink_job
    container_name: lab3_flink
    environment:
      KAFKA_BOOTSTRAP: lab3_kafka:9092
      KAFKA_TOPIC: pet_store_sales
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: lab3
      PG_USER: flink
      PG_PASSWORD: flink
    volumes:
      - ./jars/flink-sql-connector-kafka.jar:/opt/flink/lib/flink-sql-connector-kafka.jar:ro
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - lab3_net

  kafka-init:
    image: apache/kafka:4.2.0
    container_name: lab3_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - lab3_net
    entrypoint: ["/bin/bash", "-c"]
    command: >
      /opt/kafka/bin/kafka-topics.sh
      --bootstrap-server lab3_kafka:9092
      --create
      --if-not-exists
      --topic pet_store_sales
      --partitions 1
      --replication-factor 1


volumes:
  lab3_pg_data:
  lab3_kafka_data:
